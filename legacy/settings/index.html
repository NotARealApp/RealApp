<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Settings</title>
<meta name="theme-color" content="#141218">
<link rel="manifest" href="../manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Settings">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+Malayalam:wght@400;500;700&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<script src="../i18n.js"></script>
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")); I18N.applyDir();</script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0 auto; max-width: 520px; padding: 16px;
    background: var(--md-surface); color: var(--md-on-surface);
    font-family: var(--md-font); -webkit-font-smoothing: antialiased;
  }
  @media (min-width: 768px) { body { max-width: 640px; } }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .header-actions { display: flex; gap: 8px; }
  h1 { font: var(--md-headline-small); margin: 0; }
  .subtitle { color: var(--md-on-surface-variant); font: var(--md-body-medium); margin: 6px 0 16px; }
  .card {
    background: var(--md-surface-container); border: 1px solid var(--md-outline-variant);
    border-radius: var(--md-shape-xl); padding: 16px; margin-bottom: 14px; box-shadow: var(--md-elev-1);
  }
  .card h2 { font: var(--md-label-medium); text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--md-on-surface-variant); margin: 0 0 12px; }
  .row { display: flex; gap: 8px; }
  .field-input {
    flex: 1; min-width: 0; height: 48px; padding: 11px 12px;
    background: var(--md-surface-container-high); border: 1px solid var(--md-outline-variant);
    border-radius: var(--md-shape-md); color: var(--md-on-surface); font-size: 0.95rem; font-family: inherit;
  }
  .field-input:focus { outline: 2px solid var(--md-primary); border-color: transparent; }
  .gps-btn {
    flex: none; width: 48px; height: 48px; border: 1px solid var(--md-outline);
    border-radius: var(--md-shape-md); background: var(--md-surface-container-high);
    color: var(--md-primary); cursor: pointer; font-size: 1.1rem;
  }
  .matches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip {
    background: var(--md-surface-container-high); border: 1px solid var(--md-outline);
    border-radius: var(--md-shape-sm); padding: 8px 12px; color: var(--md-on-surface);
    font: var(--md-label-large); cursor: pointer; text-align: left;
  }
  .chip:hover { background: var(--md-surface-container-highest); }
  .picked {
    display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px 12px;
    background: color-mix(in srgb, var(--md-primary) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--md-primary) 40%, transparent);
    border-radius: var(--md-shape-md); font: var(--md-body-small); color: var(--md-on-surface);
  }
  .picked.empty { background: transparent; border-style: dashed; color: var(--md-on-surface-variant); }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .time-field span { display: block; font: var(--md-label-small); text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--md-on-surface-variant); margin-bottom: 6px; }
  .time-field input {
    width: 100%; height: 48px; padding: 0 12px; background: var(--md-surface-container-high);
    border: 1px solid var(--md-outline-variant); border-radius: var(--md-shape-md);
    color: var(--md-on-surface); font-size: 0.95rem; font-family: inherit;
  }
  .btn {
    min-height: 48px; padding: 12px 20px; border-radius: var(--md-shape-full);
    font: var(--md-label-large); cursor: pointer; border: none;
  }
  .btn-primary { background: var(--md-primary); color: var(--md-on-primary); box-shadow: var(--md-elev-1); }
  .btn-ghost { background: transparent; color: var(--md-on-surface); border: 1px solid var(--md-outline); }
  .btn-tonal { background: var(--md-secondary-container); color: var(--md-on-secondary-container); }
  .actions { display: flex; gap: 10px; margin-top: 4px; }
  .actions .btn { flex: 1; }
  .status { text-align: center; font: var(--md-body-small); color: var(--md-on-surface-variant);
    min-height: 1.2em; margin: 10px 0; }
  .status.ok { color: var(--status-good); }
  .status.bad { color: var(--status-bad); }
  .test-result { margin-top: 10px; font: var(--md-body-small); }
  .icon-btn svg, .gps-btn { line-height: 1; }
</style>
</head>
<body>
  <header class="header-row">
    <h1 data-i18n="set.title">Settings</h1>
    <div class="header-actions">
      <a class="icon-btn" href="../" title="All apps" aria-label="Back to home" data-i18n-aria="a11y.home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a>
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme" data-i18n-aria="a11y.theme"></button>
    </div>
  </header>
  <p class="subtitle" data-i18n="set.subtitle">Set your home & office for the commute planner. Saved on this device.</p>

  <section class="card">
    <h2 data-i18n="set.language">🌐 Language</h2>
    <select class="field-input" id="langSelect" style="width:100%">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="ml">മലയാളം</option>
      <option value="fa">فارسی</option>
    </select>
  </section>

  <section class="card">
    <h2 data-i18n="set.home">🏠 Home</h2>
    <div class="row">
      <input class="field-input" id="homeSearch" type="text" placeholder="Search address (e.g. Riesenfeldstr. 10, München)" data-i18n-ph="set.searchHome" autocomplete="off">
      <button class="gps-btn" id="homeGps" title="Use my current location" aria-label="Use my current location" data-i18n-aria="set.gps" data-i18n-title="set.gps">📍</button>
    </div>
    <div class="matches" id="homeMatches"></div>
    <div class="picked empty" id="homePicked" data-i18n="set.noPick">No address picked yet.</div>
  </section>

  <section class="card">
    <h2 data-i18n="set.office">🏢 Office</h2>
    <div class="row">
      <input class="field-input" id="officeSearch" type="text" placeholder="Search address (e.g. Lenbachplatz 3, München)" data-i18n-ph="set.searchOffice" autocomplete="off">
      <button class="gps-btn" id="officeGps" title="Use my current location" aria-label="Use my current location" data-i18n-aria="set.gps" data-i18n-title="set.gps">📍</button>
    </div>
    <div class="matches" id="officeMatches"></div>
    <div class="picked empty" id="officePicked" data-i18n="set.noPick">No address picked yet.</div>
  </section>

  <section class="card">
    <h2 data-i18n="set.times">🕘 Usual times</h2>
    <div class="time-row">
      <label class="time-field"><span data-i18n="set.arrival">Office arrival</span><input id="arrival" type="time"></label>
      <label class="time-field"><span data-i18n="set.return">Home return</span><input id="return" type="time"></label>
    </div>
  </section>

  <section class="card">
    <h2 data-i18n="set.check">✅ Check it works</h2>
    <button class="btn btn-tonal" id="testBtn" style="width:100%" data-i18n="set.testBtn">Test commute route</button>
    <div class="test-result" id="testResult"></div>
  </section>

  <div class="status" id="status"></div>
  <div class="actions">
    <button class="btn btn-ghost" id="resetBtn" data-i18n="set.reset">Reset to defaults</button>
    <button class="btn btn-primary" id="saveBtn" data-i18n="set.save">Save</button>
  </div>

<script src="app.js"></script>
<script>if ("serviceWorker" in navigator) addEventListener("load", () => navigator.serviceWorker.register("../sw.js"));</script>
</body>
</html>
