<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gym</title>
<meta name="theme-color" content="#141218">
<link rel="manifest" href="../manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+Malayalam:wght@400;500;700&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<script src="../i18n.js"></script>
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")); I18N.applyDir();</script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    font-family: var(--md-font);
    background: var(--md-surface);
    color: var(--md-on-surface);
    padding: 16px;
    max-width: 520px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  h1 { font: var(--md-headline-small); margin: 0; letter-spacing: -0.01em; }
  /* .icon-btn defined once in ../tokens.css */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding: 24px 0 48px;
  }
  .pic {
    width: 240px; max-width: 72vw; height: auto;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
  }
  .badge {
    display: inline-block;
    background: color-mix(in srgb, var(--md-warning) 16%, transparent);
    color: var(--md-warning);
    border: 1px solid color-mix(in srgb, var(--md-warning) 40%, transparent);
    border-radius: var(--md-shape-full);
    padding: 6px 14px;
    font: var(--md-label-medium);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .title { font: var(--md-title-large); margin: 0; }
  .sub { color: var(--md-on-surface-variant); font: var(--md-body-large); max-width: 30ch; margin: 0; }
</style>
</head>
<body>
  <header class="header-row">
    <h1>🏋️ Gym</h1>
    <a class="icon-btn" href="../" title="All apps" aria-label="Back to home page" data-i18n-aria="a11y.home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
  </header>

  <div class="stage">
    <span class="badge" data-i18n="badge.dev">🚧 Under development</span>
    <img class="pic" src="underdevelopment.webp" alt="Bundled up, ready for the cold gym" loading="lazy">
    <h2 class="title" data-i18n="gym.title">Gym is warming up…</h2>
    <p class="sub" data-i18n="gym.sub">Our dev showed up dressed for the weather. Check back soon. 💪🥶</p>
  </div>
<script>I18N.apply(); if ("serviceWorker" in navigator) addEventListener("load", () => navigator.serviceWorker.register("../sw.js"));</script>
</body>
</html>
